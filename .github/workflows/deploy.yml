name: Deploy to Cloudflare Workers

# Déploie le site à chaque push sur main : build Vite puis `wrangler deploy`.
# Le token Cloudflare (scopé Workers Scripts:Edit) est stocké en secret GitHub.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Moindre privilège : le déploiement n'a besoin que de LIRE le dépôt
    # (checkout). Verrouille le GITHUB_TOKEN indépendamment du défaut du repo.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - name: Deploy with Wrangler
        run: npx wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
